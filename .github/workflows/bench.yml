# .github/workflows/bench.yml
name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: never
  # ── Changed from "-C target-cpu=native" ──────────────────────────────────
  # target-cpu=native asks the compiler to emit the widest instructions the
  # *compile-host* CPU supports (potentially AVX-512 on some GH runners) and
  # then assumes the *run-host* supports them too.  When those are different
  # VMs the result is SIGILL.  Pinning to +avx2,+fma gives the same ~3-5×
  # throughput win for the scoring hot-path while staying within the feature
  # set that every x86-64 GitHub Actions runner has supported since 2019.
  RUSTFLAGS: "-C target-feature=+avx2,+fma"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark:
    name: Run criterion benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      # ── Compile all bench binaries once, loudly, into the log ────────────────
      - name: Compile bench binaries
        run: cargo bench --no-run

      # ── Run each bench binary ─────────────────────────────────────────────────
      - name: Run scoring benchmarks
        run: |
          set -o pipefail
          cargo bench --bench scoring_bench -- --output-format bencher \
            | tee scoring_raw.txt

      - name: Run pipeline benchmarks
        run: |
          set -o pipefail
          cargo bench --bench pipeline_bench -- --output-format bencher \
            | tee pipeline_raw.txt

      - name: Run thunder benchmarks
        run: |
          set -o pipefail
          cargo bench --bench thunder_bench -- --output-format bencher \
            | tee thunder_raw.txt

      # ── Extract only bencher lines and validate ───────────────────────────────
      - name: Extract and validate bench results
        run: |
          grep -h '^test ' scoring_raw.txt pipeline_raw.txt thunder_raw.txt \
            > bench_output.txt || true

          line_count=$(wc -l < bench_output.txt)
          echo "Captured $line_count benchmark result lines:"
          cat bench_output.txt

          if [ "$line_count" -eq 0 ]; then
            echo "ERROR: No benchmark results found!"
            cat scoring_raw.txt pipeline_raw.txt thunder_raw.txt
            exit 1
          fi

      # ── Store results and push history to gh-pages ────────────────────────────
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: X Algorithm Benchmarks
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      # ── Deploy landing page via git worktree (no extra network clone) ─────────
      #
      # benchmark-action already pushed dev/bench/ to gh-pages above.
      # We fetch that updated branch locally and add index.html using a
      # git worktree — a linked working directory of the branch that requires
      # zero network traffic (the branch objects are already local after fetch).
      - name: Push landing page to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add _gh_pages_wt gh-pages
          cp .github/x-bench-index.html _gh_pages_wt/index.html
          cd _gh_pages_wt
          git add index.html
          git diff --cached --quiet \
            || git commit -m "chore: update bench landing page [skip ci]"
          git push origin gh-pages
          cd ..
          git worktree remove _gh_pages_wt

      # ── Publish step summary ──────────────────────────────────────────────────
      - name: Publish step summary
        if: always()
        run: |
          {
            echo "## X Algorithm Bench — Build #${{ github.run_number }}"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`  **Commit:** \`${GITHUB_SHA:0:8}\`  **RUSTFLAGS:** \`$RUSTFLAGS\`"
            echo ""

            emit_table() {
              local label="$1" file="$2"
              echo "### $label"
              echo ""
              echo "| Benchmark | ns/iter | ±variance |"
              echo "|-----------|---------|-----------|"
              if [ ! -s "$file" ]; then
                echo "| *(no results)* | — | — |"
              else
                grep '^test ' "$file" | while IFS= read -r line; do
                  name=$(echo "$line" | sed 's/^test //' | sed 's/ \.\.\..*//')
                  ns=$(echo "$line"   | grep -oP '[0-9,]+ ns/iter' | head -1 | tr -d ',')
                  var=$(echo "$line"  | grep -oP '\(\+/- [0-9,]+\)' | head -1 \
                          | tr -d '()/+ ' | sed 's/-//' || echo "—")
                  echo "| \`${name}\` | ${ns:-—} | ±${var:-—} |"
                done
              fi
              echo ""
            }

            emit_table "Scoring / Ranking" scoring_raw.txt
            emit_table "Filter Pipeline"   pipeline_raw.txt
            emit_table "Thunder Post Store" thunder_raw.txt

            echo "---"
            echo ""
            echo "### mid-math SIMD Opportunity Map"
            echo ""
            echo "| Hot Path | Scalar (Build #20) | Optimised Path | Status |"
            echo "|----------|--------------------|----------------|--------|"
            echo "| \`compute_weighted_score\` | ~14 ns (22 scalar mul-adds) | 6× \`f32x4\` mul + hsum (AVX2) | ✅ implemented |"
            echo "| \`diversity_multiplier\` | ~51 ns/cand (powf × N) | precomputed \`[f64;256]\` table | ✅ implemented |"
            echo "| top-K selection (2000→50) | full \`sort_unstable\` | \`select_nth_unstable_by\` + partial sort | ✅ implemented |"
            echo "| \`offset_score\` (batch) | branch per candidate | \`f32x4::blend\` branchless | 🔲 todo |"
            echo "| \`bloom may_contain\` | scalar hash loop | \`u32x4\` multiply + bit-extract | 🔲 todo |"
            echo "| DashMap double-lookup | per-user lock + per-post lookup | batch key prefetch / slab | 🔲 todo |"
            echo ""
            repo_name=$(echo '${{ github.repository }}' | cut -d'/' -f2)
            echo "> [📊 Full benchmark history](https://${{ github.repository_owner }}.github.io/${repo_name}/dev/bench/)"
          } >> $GITHUB_STEP_SUMMARY

      # ── Artifacts ─────────────────────────────────────────────────────────────
      - name: Upload criterion HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report-${{ github.run_number }}
          path: target/criterion/
          retention-days: 30

      - name: Upload raw bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-raw-${{ github.run_number }}
          path: |
            scoring_raw.txt
            pipeline_raw.txt
            thunder_raw.txt
            bench_output.txt
          retention-days: 30
