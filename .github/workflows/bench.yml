# .github/workflows/bench.yml
name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: never
  RUSTFLAGS: "-C target-cpu=native"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  benchmark:
    name: Run criterion benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      # ── Compile all bench binaries once, loudly, into the log ────────────────
      # This separates build noise from benchmark output so later tee calls
      # only capture criterion's stdout (the bencher result lines).

      - name: Compile bench binaries
        run: cargo bench --no-run

      # ── Run each bench binary — stdout → tee, build stderr already done ──────
      # No 2>&1: cargo build output is already cached/done; criterion writes
      # bencher lines to stdout only.  pipefail ensures a bench crash fails
      # the step instead of silently producing an empty file.

      - name: Run scoring benchmarks
        run: |
          set -o pipefail
          cargo bench --bench scoring_bench -- --output-format bencher \
            | tee scoring_raw.txt

      - name: Run pipeline benchmarks
        run: |
          set -o pipefail
          cargo bench --bench pipeline_bench -- --output-format bencher \
            | tee pipeline_raw.txt

      - name: Run thunder benchmarks
        run: |
          set -o pipefail
          cargo bench --bench thunder_bench -- --output-format bencher \
            | tee thunder_raw.txt

      # ── Extract only bencher lines and validate ───────────────────────────────
      # criterion stdout in bencher mode contains both progress lines and the
      # final "test NAME ... bench: X ns/iter" results.  We extract only the
      # latter into bench_output.txt so the action gets a clean input.

      - name: Extract and validate bench results
        run: |
          grep '^test ' scoring_raw.txt pipeline_raw.txt thunder_raw.txt \
            > bench_output.txt || true

          line_count=$(wc -l < bench_output.txt)
          echo "Captured $line_count benchmark result lines:"
          cat bench_output.txt

          if [ "$line_count" -eq 0 ]; then
            echo ""
            echo "ERROR: No benchmark result lines found — dumping raw files for diagnosis:"
            echo "=== scoring_raw.txt ===" && cat scoring_raw.txt
            echo "=== pipeline_raw.txt ===" && cat pipeline_raw.txt
            echo "=== thunder_raw.txt ===" && cat thunder_raw.txt
            exit 1
          fi

      # ── Store results and push history to gh-pages ────────────────────────────

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: X Algorithm Benchmarks
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: "110%"
          comment-on-alert: true
          fail-on-alert: false
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench

      # ── Deploy landing page — runs after benchmark-action guarantees gh-pages exists

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-dir
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push landing page to gh-pages
        run: |
          cp .github/x-bench-index.html gh-pages-dir/index.html
          cd gh-pages-dir
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet \
            || git commit -m "Update bench landing page [skip ci]"
          git push

      # ── Publish step summary ──────────────────────────────────────────────────

      - name: Publish step summary
        if: always()
        run: |
          {
            echo "## X Algorithm Bench — Build #${{ github.run_number }}"
            echo ""
            echo "**Branch:** \`${{ github.ref_name }}\`  **Commit:** \`${GITHUB_SHA:0:8}\`  **RUSTFLAGS:** \`$RUSTFLAGS\`"
            echo ""

            emit_table() {
              local label="$1" file="$2"
              echo "### $label"
              echo ""
              echo "| Benchmark | ns/iter | ±variance |"
              echo "|-----------|---------|-----------|"
              if [ ! -s "$file" ]; then
                echo "| *(no results)* | — | — |"
              else
                grep '^test ' "$file" | while IFS= read -r line; do
                  name=$(echo "$line" | sed 's/^test //' | sed 's/ \.\.\..*//')
                  ns=$(echo "$line"   | grep -oP '[0-9,]+ ns/iter' | head -1 | tr -d ',')
                  var=$(echo "$line"  | grep -oP '\(\+/- [0-9,]+\)' | head -1 \
                          | tr -d '()/+ ' | sed 's/-//' || echo "—")
                  echo "| \`${name}\` | ${ns:-—} | ±${var:-—} |"
                done
              fi
              echo ""
            }

            emit_table "Scoring / Ranking" scoring_raw.txt
            emit_table "Filter Pipeline"   pipeline_raw.txt
            emit_table "Thunder Post Store" thunder_raw.txt

            echo "---"
            echo ""
            echo "### mid-math SIMD Opportunity Map"
            echo ""
            echo "| Hot Path | Current | SIMD Approach | Expected Gain |"
            echo "|----------|---------|---------------|---------------|"
            echo "| \`compute_weighted_score\` | 22 scalar mul-adds | 6× \`f32x4\` dot + hsum | 3–5× |"
            echo "| \`offset_score\` (batch) | branch per candidate | \`f32x4::blend\` branchless | ~2× |"
            echo "| \`diversity_multiplier\` | \`powf\` per candidate | precomputed table + \`f32x4\` mul | 4–8× |"
            echo "| \`bloom may_contain\` | scalar hash loop | \`u32x4\` multiply + bit-extract | 2–3× |"
            echo "| Score sort | scalar \`partial_cmp\` | SIMD radix pre-partition | 1.5–2× |"
            echo ""
            repo_name=$(echo '${{ github.repository }}' | cut -d'/' -f2)
            echo "> [📊 Full benchmark history](https://${{ github.repository_owner }}.github.io/${repo_name}/dev/bench/)"
          } >> $GITHUB_STEP_SUMMARY

      # ── Artifacts ─────────────────────────────────────────────────────────────

      - name: Upload criterion HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report-${{ github.run_number }}
          path: target/criterion/
          retention-days: 30

      - name: Upload raw bench output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-raw-${{ github.run_number }}
          path: |
            scoring_raw.txt
            pipeline_raw.txt
            thunder_raw.txt
            bench_output.txt
          retention-days: 30
