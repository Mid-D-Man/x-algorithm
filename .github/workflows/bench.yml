name: Benchmarks

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:        # allow manual runs from the Actions tab

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-C target-cpu=native"   # lets LLVM auto-vectorise for the host

jobs:
  benchmark:
    name: Run criterion benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Run benchmarks
        # `-- --output-format bencher` emits lines that the store-results step understands
        run: cargo bench --bench scoring_bench -- --output-format bencher | tee bench_output.txt

      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Scoring Benchmarks
          tool: cargo
          output-file-path: bench_output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true                  # pushes to gh-pages branch
          alert-threshold: "110%"          # flag regressions > 10%
          comment-on-alert: true
          fail-on-alert: false             # warn but don't break CI

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: criterion-report
          path: target/criterion/
          retention-days: 14
